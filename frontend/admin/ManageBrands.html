<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="../admin/dashboard.css">
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/footer.css">
   
</head>
<body>
    <div id="navbar-container"></div>

        <div class="dashboard-layout">
      
        <div id="sidebar-container"></div>
        

    <main>

        
        <section class="brands-section">
            <h2>Brands</h2>

            <div class="add-brand">
                <input type="text" id="brand-name" placeholder="Brand name">
                <input type="text" id="brand-description" placeholder="Description (optional)">
                <input type="file" id="brand-image" accept="image/*">
                <button onclick="addBrand()">Add Brand</button>
            </div>

            <!-- dashboard.html -->
            <div id="admin-brands-container"></div> 
        </section>
        
    </main>

</div>
    <div id="edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#1b1b1b; border:1px solid #2d2d2d; border-radius:16px; padding:28px; width:min(500px,90%); display:flex; flex-direction:column; gap:12px;">
        <h3 style="color:#00C2FF;">Edit Brand</h3>
        <input type="hidden" id="edit-brand-id">
        <input type="text" id="edit-brand-name" placeholder="Brand name">
        <input type="text" id="edit-brand-description" placeholder="Description (optional)">
        <input type="file" id="edit-brand-image" accept="image/*">
        <div style="display:flex; gap:10px;">
            <button onclick="submitUpdateBrand()">Save</button>
            <button onclick="closeEditModal()" style="background:#333;">Cancel</button>
        </div>
    </div>
</div>



    <div id="footer-container"></div>   
    
    <script src="../js/auth.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../admin/dashboard.js"></script>
    <script src="../js/footer.js"></script>
    <script src="../admin/adminNav.js"></script>

    
</body>
