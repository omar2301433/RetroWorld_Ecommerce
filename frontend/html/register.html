<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register</title>
    <link rel="stylesheet" href="../css/register.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/index.css">

</head>
<body>


<nav class="navbar">
   <a href="../index.html" class="logo-link">
      <h1 class="logo">RETRO<span>WORLD</span></h1>
    </a>
</nav>

<div class="register-container">
    <div class="register-box">
        <h2>Register</h2>
        <form autocomplete="off">
            <input type="username" id="username" placeholder="Username" required autocomplete="off">
            <input type="email" id="email" placeholder="Email" required autocomplete="off">
            <input type="password" id="password" placeholder="Password" required autocomplete="new-password">
            <button type="button" onclick="register()">Sign Up</button>
             <p id="message"></p>
        </form>
        <p>Already have an account? <a href="../html/login.html">Login</a></p>
    </div>
</div>



<script src="../js/auth.js"></script>

</body>
</html>
